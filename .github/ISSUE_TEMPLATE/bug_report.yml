name: Bug Report
description: Something broken? Tell us what happened.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! The more detail you give, the faster we can fix it.

  - type: dropdown
    id: provider
    attributes:
      label: Which provider is affected?
      options:
        - Greenhouse
        - Ashby
        - Lever
        - SmartRecruiters
        - Workable
        - Recruitee
        - Cutshort
        - Internshala
        - scan.mjs (general)
        - sync.mjs
        - Other
    validations:
      required: true

  - type: input
    id: company
    attributes:
      label: Company name (if applicable)
      placeholder: e.g. Razorpay, Swiggy

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe what went wrong — error message, unexpected output, etc.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: node --version
    validations:
      required: true
